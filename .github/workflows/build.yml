name: 双平台构建

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    name: Windows
    runs-on: windows-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 安装依赖
        shell: bash
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: 创建占位数据文件
        shell: bash
        run: echo "[]" > data.json

      - name: PyInstaller 打包
        run: pyinstaller build.spec

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: resume-ledger-windows
          path: dist/招聘台账.exe

  build-macos:
    name: macOS
    runs-on: macos-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 x86_64 Python
        run: |
          curl -o python.pkg https://www.python.org/ftp/python/3.11.11/python-3.11.11-macos11.pkg
          sudo installer -pkg python.pkg -target /
          export PATH="/Library/Frameworks/Python.framework/Versions/3.11/bin:$PATH"
          echo "PATH=/Library/Frameworks/Python.framework/Versions/3.11/bin:$PATH" >> $GITHUB_ENV
          arch -x86_64 python3.11 --version

      - name: 安装依赖 (x86_64)
        run: |
          arch -x86_64 pip3.11 install --upgrade pip
          arch -x86_64 pip3.11 install -r requirements.txt
          arch -x86_64 pip3.11 install pyinstaller

      - name: 创建占位数据文件
        run: echo "[]" > data.json

      - name: PyInstaller 打包 (x86_64)
        run: arch -x86_64 pyinstaller build.spec

      - name: macOS 打包 DMG
        run: |
          hdiutil create \
            -volname "招聘台账" \
            -srcfolder "dist/招聘台账.app" \
            -ov -format UDZO \
            "dist/招聘台账-$(git describe --tags --always).dmg"
          ls -lh dist/

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: resume-ledger-macos
          path: dist/招聘台账*.dmg

  release:
    name: 发布 Release
    needs: [build-windows, build-macos]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 下载所有构建产物
        uses: actions/download-artifact@v4

      - name: 创建 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "招聘台账 ${{ github.ref_name }}"
          body: |
            ## 安装说明

            - **Windows**: 下载 `.exe` 文件，双击运行
            - **macOS**: 下载 `.dmg` 文件，打开后将「招聘台账」拖入 Applications
            - 首次启动可能需要等待几秒钟
            - 数据保存在程序同目录下的 `data.json` 中

            ## 功能
            - 拖拽上传简历（PDF/Word/TXT），自动解析
            - 岗位分类 + 质量分类 + 技能标签
            - 多维度筛选匹配
            - 数据看板（岗位分布、学历分布、城市分布等）
          generate_release_notes: true
          files: |
            resume-ledger-windows/招聘台账.exe
            resume-ledger-macos/招聘台账*.dmg
