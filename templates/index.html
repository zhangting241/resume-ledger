<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>招聘台账</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <!-- 头部 -->
        <header>
            <div class="header-left">
                <h1>📋 招聘台账</h1>
                <span class="subtitle">拖拽上传简历，自动识别入库</span>
            </div>
            <div class="header-right">
                <span class="status-dot" id="statusDot"></span>
                <span id="statusText">就绪</span>
                <span class="divider">|</span>
                <span id="countText">共 0 条记录</span>
                <button class="btn btn-sm btn-clear" onclick="clearAll()" title="清空所有数据">🗑️ 清空</button>
            </div>
        </header>

        <!-- 三分类拖拽上传区域 -->
        <div class="drop-zone-row">
            <!-- 优秀储备 -->
            <div class="drop-zone drop-zone-star" id="dropZone-star" data-category="优秀储备">
                <div class="drop-zone-content">
                    <div class="drop-icon">⭐</div>
                    <p class="drop-title">优秀储备</p>
                    <p class="drop-hint">拖拽优质简历到此处</p>
                    <input type="file" class="drop-file-input" accept=".pdf,.docx,.doc,.txt" multiple hidden>
                </div>
                <div class="upload-progress" style="display:none">
                    <div class="progress-bar"><div class="progress-bar-inner"></div></div>
                    <p class="progress-text"></p>
                </div>
            </div>

            <!-- 常规 -->
            <div class="drop-zone drop-zone-normal" id="dropZone-normal" data-category="常规">
                <div class="drop-zone-content">
                    <div class="drop-icon">📋</div>
                    <p class="drop-title">常规</p>
                    <p class="drop-hint">拖拽普通简历到此处</p>
                    <input type="file" class="drop-file-input" accept=".pdf,.docx,.doc,.txt" multiple hidden>
                </div>
                <div class="upload-progress" style="display:none">
                    <div class="progress-bar"><div class="progress-bar-inner"></div></div>
                    <p class="progress-text"></p>
                </div>
            </div>

            <!-- 避雷 -->
            <div class="drop-zone drop-zone-warn" id="dropZone-warn" data-category="避雷">
                <div class="drop-zone-content">
                    <div class="drop-icon">⚠️</div>
                    <p class="drop-title">避雷</p>
                    <p class="drop-hint">拖拽有风险简历到此处</p>
                    <input type="file" class="drop-file-input" accept=".pdf,.docx,.doc,.txt" multiple hidden>
                </div>
                <div class="upload-progress" style="display:none">
                    <div class="progress-bar"><div class="progress-bar-inner"></div></div>
                    <p class="progress-text"></p>
                </div>
            </div>
        </div>

        <!-- 搜索栏 -->
        <div class="toolbar">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="搜索姓名、公司、岗位..." oninput="filterTable()">
                <span class="search-icon">🔍</span>
            </div>
            <div class="filter-group">
                <select id="categoryFilter" onchange="filterTable()">
                    <option value="">全部分类</option>
                    <option value="优秀储备">⭐ 优秀储备</option>
                    <option value="常规">📋 常规</option>
                    <option value="避雷">⚠️ 避雷</option>
                </select>
            </div>
            <div class="filter-group">
                <select id="eduFilter" onchange="filterTable()">
                    <option value="">全部学历</option>
                    <option value="博士研究生">博士</option>
                    <option value="硕士研究生">硕士</option>
                    <option value="本科">本科</option>
                    <option value="大专">大专</option>
                    <option value="高中/中专">高中/中专</option>
                    <option value="未知">未知</option>
                </select>
            </div>
        </div>

        <!-- 表格 -->
        <div class="table-wrapper">
            <table id="ledgerTable">
                <thead>
                    <tr>
                        <th style="width:60px">序号</th>
                        <th style="width:80px">分类</th>
                        <th style="width:90px">姓名</th>
                        <th style="width:70px">年龄</th>
                        <th style="width:100px">学历</th>
                        <th style="width:110px">联系方式</th>
                        <th>工作经历</th>
                        <th style="width:100px">操作</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <tr class="empty-row">
                        <td colspan="8">
                            <div class="empty-state">
                                <div class="empty-icon">📂</div>
                                <p>暂无简历数据</p>
                                <p class="empty-hint">拖拽简历文件到上方区域或点击「选择文件」上传</p>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- 分享链接栏 -->
        <div class="share-bar" id="shareBar" style="display:none">
            <span class="share-label">🔗 公网访问链接（发送给朋友）：</span>
            <input type="text" id="shareUrl" class="share-url-input" readonly>
            <button class="btn btn-sm btn-primary" onclick="copyShareUrl()">📋 复制</button>
        </div>

        <!-- 底栏 -->
        <footer>
            <span id="footerInfo">本地访问：http://127.0.0.1:5000</span>
        </footer>
    </div>

    <!-- 编辑弹窗 -->
    <div class="modal-overlay" id="editModal">
        <div class="modal">
            <div class="modal-header">
                <h3>✏️ 编辑记录</h3>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="editId">
                <div class="form-group">
                    <label>姓名</label>
                    <input type="text" id="editName">
                </div>
                <div class="form-group">
                    <label>分类</label>
                    <select id="editCategory">
                        <option value="">未分类</option>
                        <option value="优秀储备">⭐ 优秀储备</option>
                        <option value="常规">📋 常规</option>
                        <option value="避雷">⚠️ 避雷</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>年龄</label>
                    <input type="text" id="editAge">
                </div>
                <div class="form-group">
                    <label>学历</label>
                    <select id="editEdu">
                        <option value="博士研究生">博士</option>
                        <option value="硕士研究生">硕士</option>
                        <option value="本科">本科</option>
                        <option value="大专">大专</option>
                        <option value="高中/中专">高中/中专</option>
                        <option value="未知">未知</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>工作经历</label>
                    <div id="editWorks"></div>
                    <button class="btn btn-sm btn-add" onclick="addWorkRow()">+ 添加经历</button>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn" onclick="closeModal()">取消</button>
                <button class="btn btn-primary" onclick="saveEdit()">保存</button>
            </div>
        </div>
    </div>

    <!-- Toast 提示 -->
    <div class="toast" id="toast"></div>

    <script src="/static/script.js"></script>
</body>
</html>
